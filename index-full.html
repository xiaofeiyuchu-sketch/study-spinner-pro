<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Study Spinner Pro</title>\n    <style>\n        body { font-family: Arial, sans-serif; }\n        #timer { font-size: 2em; margin: 20px; }\n        #todoList, #calendar, #logger { margin: 20px; }\n        .hidden { display: none; }\n    </style>\n</head>\n<body>\n    <h1>Study Spinner Pro</h1>\n    <div id="timer">Timer: <span id="time">00:00</span></div>\n    <button id="startBtn">Start</button>\n    <button id="stopBtn">Stop</button>\n    <div id="todoList">\n        <h2>To-Do List</h2>\n        <input type="text" id="todoInput">\n        <button id="addTodoBtn">Add</button>\n        <ul id="todos"></ul>\n    </div>\n    <div id="calendar">\n        <h2>Target Calendar</h2>\n        <input type="date" id="targetDate">\n        <button id="setTargetBtn">Set Target</button>\n        <p id="targetOutput"></p>\n    </div>\n    <div id="logger">\n        <h2>Study Log</h2>\n        <textarea id="logInput" rows="4" cols="50"></textarea>\n        <button id="logBtn">Log</button>\n        <div id="logOutput"></div>\n    </div>\n    <script>\n        let seconds = 0;\n        let timerInterval;\n\n        document.getElementById('startBtn').onclick = function() {\n            timerInterval = setInterval(function() {\n                seconds++;\n                let minutes = Math.floor(seconds / 60);\n                let secs = seconds % 60;\n                document.getElementById('time').innerText = (minutes < 10 ? '0' : '') + minutes + ':' + (secs < 10 ? '0' : '') + secs;\n            }, 1000);\n        };\n\n        document.getElementById('stopBtn').onclick = function() {\n            clearInterval(timerInterval);\n        };\n\n        document.getElementById('addTodoBtn').onclick = function() {\n            let todoText = document.getElementById('todoInput').value;\n            let li = document.createElement('li');\n            li.innerText = todoText;\n            document.getElementById('todos').appendChild(li);\n            document.getElementById('todoInput').value = '';\n        };\n\n        document.getElementById('setTargetBtn').onclick = function() {\n            let targetDate = document.getElementById('targetDate').value;\n            document.getElementById('targetOutput').innerText = 'Target Date Set for: ' + targetDate;\n        };\n\n        document.getElementById('logBtn').onclick = function() {\n            let logText = document.getElementById('logInput').value;\n            let logDiv = document.createElement('div');\n            logDiv.innerText = logText;\n            document.getElementById('logOutput').appendChild(logDiv);\n            document.getElementById('logInput').value = '';\n        };\n    </script>\n</body>\n</html>\n
