<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <link rel="manifest" href="manifest.json">\n    <link rel="icon" href="icons/icon-192x192.png" sizes="192x192">\n    <link rel="icon" href="icons/icon-512x512.png" sizes="512x512">\n    <title>Study Spinner Pro</title>\n    <script src="script.js" defer></script>\n</head>\n<body>\n    <h1>Study Spinner Pro</h1>\n    <div id="timer">\n        <h2>Timer</h2>\n        <p id="time-display">00:00</p>\n        <button id="start-timer">Start</button>\n        <button id="stop-timer">Stop</button>\n    </div>\n    <div id="todo-list">\n        <h2>To-Do List</h2>\n        <input type="text" id="todo-input" placeholder="Add a new task">\n        <button id="add-todo">Add</button>\n        <ul id="todos"></ul>\n    </div>\n    <div id="calendar">\n        <h2>Target Calendar</h2>\n        <input type="date" id="target-date">\n        <button id="set-target">Set Target</button>\n    </div>\n    <script>\n        let timerInterval;\n        let seconds = 0;\n        const timeDisplay = document.getElementById('time-display');\n        const startButton = document.getElementById('start-timer');\n        const stopButton = document.getElementById('stop-timer');\n        const todoInput = document.getElementById('todo-input');\n        const addTodoButton = document.getElementById('add-todo');\n        const todosList = document.getElementById('todos');\n        const targetDateInput = document.getElementById('target-date');\n        const setTargetButton = document.getElementById('set-target');\n\n        startButton.addEventListener('click', () => {\n            clearInterval(timerInterval);\n            timerInterval = setInterval(() => {\n                seconds++;\n                timeDisplay.textContent = (seconds / 60 | 0).toString().padStart(2, '0') + ':' + (seconds % 60).toString().padStart(2, '0');\n            }, 1000);\n        });\n\n        stopButton.addEventListener('click', () => {\n            clearInterval(timerInterval);\n        });\n\n        addTodoButton.addEventListener('click', () => {\n            const todoText = todoInput.value;\n            if (todoText) {\n                const li = document.createElement('li');\n                li.textContent = todoText;\n                todosList.appendChild(li);\n                todoInput.value = '';\n            }\n        });\n\n        setTargetButton.addEventListener('click', () => {\n            const targetDate = targetDateInput.value;\n            alert('Target date set to: ' + targetDate);\n        });\n    <\/script>\n</body>\n</html>
