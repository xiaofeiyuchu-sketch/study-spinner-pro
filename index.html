<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Spinner Pro</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ffffff">
</head>
<body>
    <header>
        <h1>Study Spinner Pro</h1>
    </header>
    <main>
        <section id="timer">
            <h2>Timer</h2>
            <span id="time-display">00:00:00</span>
            <button id="start-timer">Start</button>
            <button id="stop-timer">Stop</button>
            <button id="reset-timer">Reset</button>
        </section>
        <section id="todo-list">
            <h2>To-Do List</h2>
            <input type="text" id="todo-input" placeholder="Add a new task">
            <button id="add-todo">Add</button>
            <ul id="todo-items"></ul>
        </section>
        <section id="calendar">
            <h2>Calendar</h2>
            <input type="date" id="calendar-input">
            <button id="add-to-calendar">Add to Calendar</button>
            <div id="calendar-display"></div>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Study Spinner Pro</p>
    </footer>
</body>
</html>
